<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us | GreenNest Garden</title>
  <meta name="description" content="Contact GreenNest Garden for support, feedback, and partnership inquiries." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://www.yourdomain.com/contact.html" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div class="container nav">
      <h1 class="logo">GreenNest Garden</h1>
      <nav>
        <a href="index.html">Home</a>
        <a href="contact.html">Contact</a>
        <a href="about.html">About</a>
        <a href="disclaimer.html">Disclaimer</a>
      </nav>
    </div>
  </header>

  <main class="container content">
    <h2>Contact Us</h2>
    <p>
      Have a question, suggestion, or partnership inquiry? Send us a message and we will get back to you as soon as possible.
    </p>

    <form action="#" method="post" style="max-width:640px;">
      <label for="name">Full Name</label><br />
      <input id="name" name="name" type="text" required style="width:100%;padding:10px;margin:8px 0 16px;" /><br />

      <label for="email">Email Address</label><br />
      <input id="email" name="email" type="email" required style="width:100%;padding:10px;margin:8px 0 16px;" /><br />

      <label for="message">Message</label><br />
      <textarea id="message" name="message" rows="6" required style="width:100%;padding:10px;margin:8px 0 16px;"></textarea><br />

      <button class="btn" type="submit">Send Message</button>
    </form>
  </main>

  <footer>
    <div class="container footer-grid">
      <p>© 2026 GreenNest Garden. All rights reserved.</p>
      <div>
        <a href="privacy-policy.html">Privacy Policy</a>
        <a href="terms.html">Terms</a>
      </div>
    </div>
  </footer>
</body>
</html>
